# Render Blueprint for the AI Assistant service (separate from the Express
# backend). Deploy via Render dashboard: New → Blueprint → pick this repo.
# Render reads this file and pre-fills everything except the secret env vars
# (marked sync:false) — you enter those once. Reuse the SAME values as the
# existing backend service for ACCESS_TOKEN_SECRET, MONGODB_URI (→ db), and
# GOOGLE_DRIVE_CREDENTIALS_JSON.
services:
  - type: web
    name: afc-estate-ai
    runtime: python
    rootDir: ai-service
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: GOOGLE_DRIVE_CREDENTIALS_JSON
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: AI_CONVERSATIONS_FOLDER_NAME
        value: AI Conversations
      - key: ALLOWED_ORIGINS
        value: http://localhost:8081,https://sc-permaculture.vercel.app,https://afc-estate.vercel.app
