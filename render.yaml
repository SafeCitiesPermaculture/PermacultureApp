# Render Blueprint for the AI Assistant service (separate from the Express
# backend). Deploy via Render dashboard: New → Blueprint → pick this repo.
# Render reads this file and pre-fills everything except the secret env vars
# (marked sync:false) — you enter those once. Reuse the SAME values as the
# existing backend service for ACCESS_TOKEN_SECRET, MONGODB_URI (→ db), and
# GOOGLE_DRIVE_CREDENTIALS_JSON.
services:
  - type: web
    name: afc-estate-ai
    runtime: python
    rootDir: ai-service
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: GOOGLE_DRIVE_CREDENTIALS_JSON
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_KEY
        sync: false
      - key: AZURE_OPENAI_CHAT_DEPLOYMENT
        value: DeepSeek-V4-Flash
      - key: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
        value: text-embedding-3-small
      # Set these only if the embedding model lives on a separate Azure resource
      # than the chat model; otherwise leave unset to reuse the chat endpoint.
      - key: AZURE_OPENAI_EMBEDDING_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_EMBEDDING_KEY
        sync: false
      - key: AZURE_SEARCH_ENDPOINT
        sync: false
      - key: AZURE_SEARCH_KEY
        sync: false
      - key: AZURE_SEARCH_INDEX
        value: afc-estate-corpus
      - key: AI_CONVERSATIONS_FOLDER_NAME
        value: AI Conversations
      - key: ALLOWED_ORIGINS
        value: http://localhost:8081,https://sc-permaculture.vercel.app,https://afc-estate.vercel.app
