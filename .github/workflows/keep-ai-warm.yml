name: Keep AI service warm

# Render's free tier spins a service down after ~15 min of inactivity, so the
# first request after idle takes 50s+. This workflow pings BOTH Render free-tier
# services on a schedule to keep them awake during waking hours, and asserts a
# 200 so the Actions tab doubles as uptime monitoring (a red run = down):
#   - afc-estate-ai.onrender.com  (FastAPI AI service)        -> /health
#   - permacultureapp.onrender.com (Express API + chat list)  -> /api/start
# The backend serves the assistant's chat-history sidebar, so if it sleeps the
# chat list shows empty until it cold-starts.
#
# Budget math (Render free tier = 750 instance-hours/month; a service only
# burns hours while awake). Keeping a service warm N hours/day ≈ 30.4*N hrs/mo.
# We keep BOTH warm, sized for the worst case where 750 is POOLED across the
# account: combined must stay <= 750, i.e. <= ~12 h/day each. The window below
# is 11h (hours 6-16 UTC), so each service ≈ 334 hrs/mo, ≈ 668 combined —
# leaving headroom for real traffic.
#
# Schedule is UTC. Safe Cities is in Cape Town (SAST = UTC+2), so 06:00-16:59
# UTC = 08:00-18:59 local (working hours). If your Render usage page shows the
# 750 hrs is PER-SERVICE (not pooled), you can safely widen this — up to
# "*/10 * * * *" for 24/7 (~730 hrs each, still under 750).

# SUPERSEDED by cron-job.org (2026-07-01): the keep-warm + reindex pings now run
# there, which fires reliably (GitHub Actions drops/delays scheduled runs). The
# schedule below is disabled; kept only for manual runs (workflow_dispatch) as a
# backup uptime check. Re-enable the `schedule:` block if cron-job.org ever lapses.
on:
  # schedule:
  #   - cron: "*/10 6-16 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping AI service /health (allow up to 90s for a cold start)
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 \
            https://afc-estate-ai.onrender.com/health)
          echo "GET /health -> HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::error::AI service health check failed (HTTP $code)"
            exit 1
          fi

      - name: Ping backend /api/start (allow up to 90s for a cold start)
        if: always()
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 \
            https://permacultureapp.onrender.com/api/start)
          echo "GET /api/start -> HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::error::Backend health check failed (HTTP $code)"
            exit 1
          fi
