<!DOCTYPE html>
<!--
  Safe Cities Permaculture — AI Assistant
  Replies come from the FastAPI AI service: POST /chat { message, history,
  include_tasks } -> { reply, sources }.
  Chat history is persisted per-user in the Express backend (/api/chat): the
  sidebar lists saved + recent chats, unpinned chats auto-prune to the 10 most
  recent, and the Save button pins a chat to the top. Requires login.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Assistant · Safe Cities Permaculture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" href="./assets/images/logo.png" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* ---- Assistant layout: collapsible sidebar + chat area ---- */
      .assistant-shell { display: flex; align-items: stretch; gap: 0; height: 100%; min-height: 0; }
      .assistant-shell .container.chat { max-width: none; flex: 1 1 auto; min-width: 0; }

      .chat-sidebar {
        flex: 0 0 240px; width: 240px; display: flex; flex-direction: column;
        background: var(--brown-light, #f3eadd); border-right: 1px solid var(--line, #d9cbb6);
        transition: flex-basis .15s ease, width .15s ease;
      }
      .chat-sidebar.is-collapsed { flex-basis: 46px; width: 46px; }
      .chat-sidebar.is-collapsed .chat-sidebar__body,
      .chat-sidebar.is-collapsed .chat-sidebar__title { display: none; }

      .chat-sidebar__head {
        display: flex; align-items: center; justify-content: space-between;
        padding: .5rem .6rem; gap: .4rem;
      }
      .chat-sidebar__title { font-weight: 800; }
      .chat-sidebar__toggle {
        background: transparent; border: 0; cursor: pointer; font: inherit;
        font-size: 1.3rem; line-height: 1; padding: .15rem .45rem; color: var(--ink, #2f3a2f);
      }
      .chat-sidebar.is-collapsed .chat-sidebar__head { justify-content: center; padding: .5rem 0; }

      .chat-sidebar__body { display: flex; flex-direction: column; min-height: 0; flex: 1; }
      .chat-sidebar__new { margin: 0 .6rem .5rem; }
      .chat-sidebar__list { overflow-y: auto; flex: 1; padding: 0 .35rem .5rem; }
      .chat-sidebar__empty { color: #777; text-align: center; margin-top: 1rem; font-size: .9rem; }

      .chat-row {
        display: flex; align-items: center; border-radius: 8px; margin-bottom: 2px;
      }
      .chat-row.is-active { background: var(--leaf-soft, #cbd2a4); }
      .chat-row__open {
        flex: 1; min-width: 0; background: transparent; border: 0; cursor: pointer;
        font: inherit; text-align: left; padding: .5rem .5rem; color: var(--ink, #2f3a2f);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .chat-row__del {
        background: transparent; border: 0; cursor: pointer; color: var(--danger, #db0f0f);
        font-weight: 700; padding: .35rem .5rem; line-height: 1;
      }
      .page-head__actions { display: flex; align-items: center; gap: .75rem; }
      .btn--saved { background: var(--brown-medium, #ac8155); color: #fff; }
    </style>
  </head>

  <body data-page="assistant" data-requires-auth>
    <a class="skip-link" href="#main">Skip to main content</a>

    <main id="main" class="app-main app-main--chat">
      <div class="assistant-shell">
        <!-- ---------------------------------------------- Chat history sidebar -->
        <aside class="chat-sidebar" id="sidebar">
          <div class="chat-sidebar__head">
            <span class="chat-sidebar__title">Chats</span>
            <button class="chat-sidebar__toggle" id="sidebarToggle" type="button" aria-label="Collapse chat history">‹</button>
          </div>
          <div class="chat-sidebar__body">
            <button class="btn btn--leaf btn--sm chat-sidebar__new" id="newChatBtn" type="button">＋ New chat</button>
            <div class="chat-sidebar__list" id="chatList">
              <p class="chat-sidebar__empty" id="chatListEmpty">No chats yet</p>
            </div>
          </div>
        </aside>

        <!-- ---------------------------------------------- Chat area -->
        <div class="container chat">
          <header class="page-head">
            <div>
              <p class="eyebrow">Ask anything</p>
              <h1 class="page-title">Assistant</h1>
            </div>
            <div class="page-head__actions">
              <button class="btn btn--ghost btn--sm" id="saveBtn" type="button" disabled>Save</button>
              <!-- When on, the model is given the user's open tasks as context. -->
              <label class="switch">
                <input type="checkbox" id="taskToggle" />
                <span>Include my tasks</span>
              </label>
            </div>
          </header>

          <!-- Conversation transcript. aria-live so new replies are announced. -->
          <section class="chat__log" id="log" aria-live="polite" aria-label="Conversation"></section>

          <!-- Composer -->
          <form class="chat__composer" id="composer">
            <label class="sr-only" for="message">Your message</label>
            <textarea id="message" rows="1" placeholder="Ask about documents, tasks, permaculture…" required></textarea>
            <button class="btn btn--leaf" type="submit" id="sendBtn" aria-label="Send message">Send</button>
          </form>
        </div>
      </div>
    </main>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script>
      var log = document.getElementById("log");
      var composer = document.getElementById("composer");
      var input = document.getElementById("message");
      var sendBtn = document.getElementById("sendBtn");
      var taskToggle = document.getElementById("taskToggle");
      var sidebar = document.getElementById("sidebar");
      var sidebarToggle = document.getElementById("sidebarToggle");
      var newChatBtn = document.getElementById("newChatBtn");
      var chatList = document.getElementById("chatList");
      var chatListEmpty = document.getElementById("chatListEmpty");
      var saveBtn = document.getElementById("saveBtn");

      // Running history in the shape the API expects: [{role, content}].
      var history = [];
      var currentChatId = null;   // null until the chat is first persisted
      var currentPinned = false;

      var GREETING = "Hi! I'm the Safe Cities assistant. Ask me about our documents, your tasks, or permaculture know-how.";

      // ---------------------------------------------- Sidebar: collapse/expand
      sidebarToggle.addEventListener("click", function () {
        var collapsed = sidebar.classList.toggle("is-collapsed");
        sidebarToggle.textContent = collapsed ? "☰" : "‹";
        sidebarToggle.setAttribute("aria-label", collapsed ? "Open chat history" : "Collapse chat history");
      });

      // ---------------------------------------------- Sidebar: list of chats
      function loadChats() {
        return SC.Assistant.history()
          .then(function (data) { renderChatList(data.chats || []); })
          .catch(function () { /* leave the list as-is on error */ });
      }

      function renderChatList(chats) {
        chatList.innerHTML = "";
        if (!chats.length) {
          chatList.appendChild(chatListEmpty);
          chatListEmpty.hidden = false;
          return;
        }
        chats.forEach(function (chat) {
          var row = document.createElement("div");
          row.className = "chat-row" + (chat._id === currentChatId ? " is-active" : "");

          var open = document.createElement("button");
          open.type = "button";
          open.className = "chat-row__open";
          open.textContent = (chat.isPinned ? "★ " : "") + (chat.title || "Chat");
          open.title = chat.title || "Chat";
          open.addEventListener("click", function () { openChat(chat._id); });

          var del = document.createElement("button");
          del.type = "button";
          del.className = "chat-row__del";
          del.textContent = "✕";
          del.setAttribute("aria-label", "Delete chat");
          del.addEventListener("click", function (e) {
            e.stopPropagation();
            deleteChat(chat._id);
          });

          row.appendChild(open);
          row.appendChild(del);
          chatList.appendChild(row);
        });
      }

      // ---------------------------------------------- Open / new / delete
      function openChat(id) {
        SC.Assistant.get(id).then(function (data) {
          var chat = data.chat;
          currentChatId = chat._id;
          currentPinned = !!chat.isPinned;
          history = (chat.messages || []).map(function (m) {
            return { role: m.role, content: m.content };
          });
          log.innerHTML = "";
          if (!history.length) addBubble("assistant", GREETING);
          history.forEach(function (m) { addBubble(m.role, m.content); });
          updateSaveBtn();
          loadChats(); // refresh active highlight
        });
      }

      function startNewChat() {
        currentChatId = null;
        currentPinned = false;
        history = [];
        log.innerHTML = "";
        addBubble("assistant", GREETING);
        updateSaveBtn();
        loadChats();
      }
      newChatBtn.addEventListener("click", startNewChat);

      function deleteChat(id) {
        SC.Assistant.remove(id).then(function () {
          if (id === currentChatId) startNewChat();
          else loadChats();
        });
      }

      // Persist the current conversation (create or update), then refresh list.
      function persist() {
        if (!history.length) return Promise.resolve();
        return SC.Assistant.save({ chatId: currentChatId, messages: history })
          .then(function (data) {
            currentChatId = data.chat._id;
            currentPinned = !!data.chat.isPinned;
            updateSaveBtn();
            return loadChats();
          })
          .catch(function () { /* keep chatting even if a save fails */ });
      }

      // ---------------------------------------------- Save (pin) button
      function updateSaveBtn() {
        saveBtn.disabled = !currentChatId;
        saveBtn.textContent = currentPinned ? "★ Saved" : "Save";
        saveBtn.classList.toggle("btn--saved", currentPinned);
        saveBtn.classList.toggle("btn--ghost", !currentPinned);
      }
      saveBtn.addEventListener("click", function () {
        if (!currentChatId) return;
        var next = !currentPinned;
        currentPinned = next;
        updateSaveBtn();
        SC.Assistant.pin(currentChatId, next)
          .then(function () { loadChats(); })
          .catch(function () { currentPinned = !next; updateSaveBtn(); });
      });

      // ---------------------------------------------- Lightweight markdown
      // The model returns light markdown (bold, bullets). We render a safe subset
      // by escaping everything first, then re-introducing a few tags.
      function renderMarkdown(text) {
        var safe = SC.escapeHtml(text);
        // **bold**
        safe = safe.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        // bullet lines starting with "- " or "* "
        var lines = safe.split("\n");
        var html = "";
        var inList = false;
        lines.forEach(function (line) {
          var m = line.match(/^\s*[-*]\s+(.*)$/);
          if (m) {
            if (!inList) { html += "<ul>"; inList = true; }
            html += "<li>" + m[1] + "</li>";
          } else {
            if (inList) { html += "</ul>"; inList = false; }
            if (line.trim()) html += "<p>" + line + "</p>";
          }
        });
        if (inList) html += "</ul>";
        return html;
      }

      function addBubble(role, text, sources) {
        var wrap = document.createElement("div");
        wrap.className = "bubble bubble--" + role;
        var body = document.createElement("div");
        body.className = "bubble__body";
        body.innerHTML = role === "assistant" ? renderMarkdown(text) : "<p>" + SC.escapeHtml(text) + "</p>";
        wrap.appendChild(body);

        // Render any cited Drive documents as links.
        if (sources && sources.length) {
          var src = document.createElement("div");
          src.className = "bubble__sources";
          src.innerHTML = "<span>Sources:</span>";
          sources.forEach(function (s) {
            var item;
            if (s.drive_link) {
              item = document.createElement("a");
              item.href = s.drive_link;
              item.target = "_blank";
              item.rel = "noopener";
            } else {
              item = document.createElement("span");
            }
            item.className = "bubble__source";
            item.textContent = s.title || "Document";
            src.appendChild(item);
          });
          wrap.appendChild(src);
        }
        log.appendChild(wrap);
        log.scrollTop = log.scrollHeight;
        return body;
      }

      // ---------------------------------------------- Auto-grow the textarea
      input.addEventListener("input", function () {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 160) + "px";
      });
      // Enter sends; Shift+Enter makes a newline.
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          composer.requestSubmit();
        }
      });

      // ---------------------------------------------- Send
      composer.addEventListener("submit", function (e) {
        e.preventDefault();
        var text = input.value.trim();
        if (!text) return;

        addBubble("user", text);
        history.push({ role: "user", content: text });
        input.value = "";
        input.style.height = "auto";
        sendBtn.disabled = true;

        // Typing indicator while we wait for the model.
        var typing = addBubble("assistant", "…");
        typing.parentElement.classList.add("is-typing");

        SC.Assistant.chat(text, history.slice(0, -1), taskToggle.checked)
          .then(function (data) {
            typing.parentElement.remove();
            addBubble("assistant", data.reply || "(no reply)", data.sources);
            history.push({ role: "assistant", content: data.reply || "" });
            persist(); // save the conversation after each exchange
          })
          .catch(function (err) {
            typing.parentElement.remove();
            // Local dev convenience: the FastAPI AI service usually isn't running
            // on a dev machine, so on localhost we insert a stub reply and still
            // persist the chat. This lets the history/sidebar/save features be
            // tested end-to-end locally. It never runs in production, where the
            // hostname is not localhost and the AI service answers normally.
            var isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1";
            if (isLocal) {
              var stub = "(Local test reply — the AI service isn't running, so this is a placeholder so you can test chat history and saving.)";
              addBubble("assistant", stub);
              history.push({ role: "assistant", content: stub });
              persist();
              return;
            }
            var note = err.status === 503
              ? "The assistant is warming up or temporarily unavailable — please try again in a moment."
              : (err.message || "Something went wrong.");
            addBubble("assistant", note);
          })
          .then(function () {
            sendBtn.disabled = false;
            input.focus();
          });
      });

      // ---------------------------------------------- Init
      addBubble("assistant", GREETING); // friendly opening message
      loadChats();
    </script>
  </body>
</html>
