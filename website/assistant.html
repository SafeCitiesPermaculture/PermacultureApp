<!DOCTYPE html>
<!--
  Safe Cities Permaculture — AI Assistant
  Replies come from the FastAPI AI service: POST /chat { message, history,
  include_tasks } -> { reply, sources }.
  Chat history is persisted per-user in the Express backend (/api/chat): the
  collapsible sidebar lists saved chats then the 10 most recent, unpinned chats
  auto-prune to the 10 most recent, and the Save button pins a chat. Requires login.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Assistant · Safe Cities Permaculture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" href="./assets/images/logo.png" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* ---- Assistant: collapsible sidebar + chat pane ---- */
      .app-main--chat { padding: 0; gap: 0; align-items: stretch; }

      .chat-sidebar {
        flex: 0 0 260px; width: 260px; display: flex; flex-direction: column;
        background: var(--cream-deep, #f3eadd);
        border-right: 1px solid var(--line, #e3dac9);
        transition: flex-basis .15s ease, width .15s ease; overflow: hidden;
        /* Pin the chat list in view so it stays visible as the transcript grows. */
        position: sticky; top: var(--header-h, 76px); align-self: flex-start;
        height: calc(100vh - var(--header-h, 76px));
      }
      .chat-sidebar.is-collapsed { flex-basis: 52px; width: 52px; }

      .chat-sidebar__top { display: flex; align-items: center; gap: .5rem; padding: .85rem .7rem; }
      .chat-sidebar__toggle {
        background: transparent; border: 0; cursor: pointer; font-size: 1.25rem;
        line-height: 1; padding: .3rem .45rem; border-radius: 8px; color: var(--ink, #2f3a2f);
      }
      .chat-sidebar__toggle:hover { background: rgba(0,0,0,.06); }
      .chat-sidebar__brand { font-weight: 800; font-size: 1.05rem; }
      .chat-sidebar.is-collapsed .chat-sidebar__brand,
      .chat-sidebar.is-collapsed .chat-sidebar__body { display: none; }

      .chat-sidebar__body { flex: 1; overflow-y: auto; padding: .25rem .5rem 1rem; }
      .chat-sidebar__group { margin-bottom: 1rem; }
      .chat-sidebar__label {
        font-size: .72rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
        color: var(--muted, #8a8472); margin: .5rem .55rem .35rem;
      }
      .chat-sidebar__empty { color: var(--muted, #8a8472); font-size: .85rem; margin: .35rem .55rem; }

      .chat-row { display: flex; align-items: center; border-radius: 10px; }
      .chat-row:hover { background: rgba(0,0,0,.05); }
      .chat-row.is-active { background: var(--leaf-soft, #cbd2a4); }
      .chat-row__open {
        flex: 1; min-width: 0; background: transparent; border: 0; cursor: pointer; font: inherit;
        text-align: left; padding: .5rem .55rem; color: var(--ink, #2f3a2f);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .chat-row__del {
        background: transparent; border: 0; cursor: pointer; color: var(--muted, #8a8472);
        font-size: .9rem; padding: .4rem .5rem; opacity: 0; line-height: 1;
      }
      .chat-row:hover .chat-row__del { opacity: 1; }
      .chat-row__del:hover { color: var(--danger, #db0f0f); }

      /* Chat pane (replaces the old .container.chat wrapper) */
      .chat-pane {
        flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column;
        min-height: calc(100vh - var(--header-h, 64px) - 7rem);
        padding: var(--space-5, 1.5rem) var(--space-5, 1.75rem) var(--space-6, 2rem);
      }
      .page-head__actions { display: flex; align-items: center; gap: .9rem; }
      .btn--saved { background: var(--brown-medium, #ac8155); color: #fff; }

      @media (max-width: 640px) {
        .chat-sidebar { flex-basis: 200px; width: 200px; }
      }
    </style>
  </head>

  <body data-page="assistant" data-requires-auth>
    <a class="skip-link" href="#main">Skip to main content</a>

    <main id="main" class="app-main app-main--chat">
      <!-- ---------------------------------------------- Chat history sidebar -->
      <aside class="chat-sidebar" id="sidebar">
        <div class="chat-sidebar__top">
          <button class="chat-sidebar__toggle" id="sidebarToggle" type="button" aria-label="Collapse sidebar">☰</button>
          <span class="chat-sidebar__brand">Chats</span>
        </div>
        <div class="chat-sidebar__body">
          <div class="chat-sidebar__group" id="savedGroup" hidden>
            <p class="chat-sidebar__label">Saved</p>
            <div id="savedList"></div>
          </div>
          <div class="chat-sidebar__group">
            <p class="chat-sidebar__label">Recents</p>
            <div id="recentList"></div>
            <p class="chat-sidebar__empty" id="chatListEmpty">No chats yet</p>
          </div>
        </div>
      </aside>

      <!-- ---------------------------------------------- Chat pane -->
      <div class="chat-pane">
        <header class="page-head">
          <div>
            <p class="eyebrow">Ask anything</p>
            <h1 class="page-title">Assistant</h1>
          </div>
          <div class="page-head__actions">
            <button class="btn btn--leaf btn--sm" id="newChatBtn" type="button">+ New chat</button>
            <button class="btn btn--ghost btn--sm" id="saveBtn" type="button" disabled>☆ Save</button>
            <!-- When on, the model is given the user's open tasks as context. -->
            <label class="switch">
              <input type="checkbox" id="taskToggle" />
              <span>Include my tasks</span>
            </label>
          </div>
        </header>

        <!-- Conversation transcript. aria-live so new replies are announced. -->
        <section class="chat__log" id="log" aria-live="polite" aria-label="Conversation"></section>

        <!-- Composer -->
        <form class="chat__composer" id="composer">
          <label class="sr-only" for="message">Your message</label>
          <textarea id="message" rows="1" placeholder="Ask about documents, tasks, permaculture…" required></textarea>
          <button class="btn btn--leaf" type="submit" id="sendBtn" aria-label="Send message">Send</button>
        </form>
      </div>
    </main>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script>
      var log = document.getElementById("log");
      var composer = document.getElementById("composer");
      var input = document.getElementById("message");
      var sendBtn = document.getElementById("sendBtn");
      var taskToggle = document.getElementById("taskToggle");
      var sidebar = document.getElementById("sidebar");
      var sidebarToggle = document.getElementById("sidebarToggle");
      var savedGroup = document.getElementById("savedGroup");
      var savedList = document.getElementById("savedList");
      var recentList = document.getElementById("recentList");
      var chatListEmpty = document.getElementById("chatListEmpty");
      var saveBtn = document.getElementById("saveBtn");
      var newChatBtn = document.getElementById("newChatBtn");

      // Running history in the shape the API expects: [{role, content}].
      // NB: named `convo`, not `history` — the latter collides with the
      // read-only global `window.history`, so assignments silently no-op.
      var convo = [];
      var currentChatId = null;   // null until the chat is first persisted
      var currentPinned = false;

      var GREETING = "Hi! I'm the Safe Cities assistant. Ask me about our documents, your tasks, or permaculture know-how.";

      // ---------------------------------------------- Keep --header-h accurate
      // The site header wraps to two rows (nav + greeting), so its real height
      // exceeds the static --header-h. Sync it so the sticky sidebar pins
      // exactly below the header instead of tucking underneath it.
      function syncHeaderHeight() {
        var header = document.querySelector(".site-header");
        if (header) {
          document.documentElement.style.setProperty("--header-h", header.offsetHeight + "px");
        }
      }
      syncHeaderHeight();
      window.addEventListener("resize", syncHeaderHeight);
      window.addEventListener("load", syncHeaderHeight);

      // ---------------------------------------------- Sidebar: collapse/expand
      sidebarToggle.addEventListener("click", function () {
        var collapsed = sidebar.classList.toggle("is-collapsed");
        sidebarToggle.setAttribute("aria-label", collapsed ? "Open sidebar" : "Collapse sidebar");
      });

      // ---------------------------------------------- Sidebar: list of chats
      function loadChats(attempt) {
        attempt = attempt || 0;
        // The backend is on Render's free tier and can be cold-starting (~30-60s).
        // While we have nothing to show, surface a loading state instead of a
        // misleading empty list, and retry with backoff until it wakes.
        function isEmpty() {
          return savedList.childElementCount + recentList.childElementCount === 0;
        }
        if (isEmpty()) {
          chatListEmpty.hidden = false;
          chatListEmpty.textContent = attempt === 0 ? "Loading chats…" : "Waking server…";
        }
        return SC.Assistant.history()
          .then(function (data) { renderChatList(data.chats || []); })
          .catch(function () {
            if (!isEmpty()) return; // we already have a list; keep it as-is
            if (attempt < 5) {
              var delay = 2000 + attempt * 2000; // 2s, 4s, 6s, 8s, 10s
              return new Promise(function (resolve) {
                setTimeout(function () { resolve(loadChats(attempt + 1)); }, delay);
              });
            }
            chatListEmpty.hidden = false;
            chatListEmpty.textContent = "Couldn’t load chats — refresh to retry.";
          });
      }

      // Saved (pinned) chats on top, then the recent (unpinned) chats, which the
      // backend already returns newest-first and capped at 10.
      function renderChatList(chats) {
        var saved = chats.filter(function (c) { return c.isPinned; });
        var recents = chats.filter(function (c) { return !c.isPinned; });

        savedList.innerHTML = "";
        recentList.innerHTML = "";
        savedGroup.hidden = saved.length === 0;
        saved.forEach(function (c) { savedList.appendChild(chatRow(c)); });
        recents.forEach(function (c) { recentList.appendChild(chatRow(c)); });
        chatListEmpty.textContent = "No chats yet";
        chatListEmpty.hidden = saved.length + recents.length > 0;
      }

      function chatRow(chat) {
        var row = document.createElement("div");
        row.className = "chat-row" + (chat._id === currentChatId ? " is-active" : "");

        var open = document.createElement("button");
        open.type = "button";
        open.className = "chat-row__open";
        open.textContent = chat.title || "Chat";
        open.title = chat.title || "Chat";
        open.addEventListener("click", function () { openChat(chat._id); });

        var del = document.createElement("button");
        del.type = "button";
        del.className = "chat-row__del";
        del.textContent = "✕";
        del.setAttribute("aria-label", "Delete chat");
        del.addEventListener("click", function (e) { e.stopPropagation(); deleteChat(chat._id); });

        row.appendChild(open);
        row.appendChild(del);
        return row;
      }

      // ---------------------------------------------- Open / reset / delete
      function openChat(id) {
        SC.Assistant.get(id).then(function (data) {
          var chat = data.chat;
          currentChatId = chat._id;
          currentPinned = !!chat.isPinned;
          convo = (chat.messages || []).map(function (m) {
            return { role: m.role, content: m.content };
          });
          log.innerHTML = "";
          if (!convo.length) addBubble("assistant", GREETING);
          convo.forEach(function (m) { addBubble(m.role, m.content); });
          updateSaveBtn();
          loadChats(); // refresh active highlight
        });
      }

      function resetToNewChat() {
        currentChatId = null;
        currentPinned = false;
        convo = [];
        log.innerHTML = "";
        addBubble("assistant", GREETING);
        updateSaveBtn();
      }
      newChatBtn.addEventListener("click", function () {
        resetToNewChat();
        loadChats(); // clear the active highlight in the sidebar
      });

      function deleteChat(id) {
        SC.Assistant.remove(id).then(function () {
          if (id === currentChatId) resetToNewChat();
          loadChats();
        });
      }

      // Persist the current conversation (create or update), then refresh list.
      function persist() {
        if (!convo.length) return Promise.resolve();
        return SC.Assistant.save({ chatId: currentChatId, messages: convo })
          .then(function (data) {
            currentChatId = data.chat._id;
            currentPinned = !!data.chat.isPinned;
            updateSaveBtn();
            return loadChats();
          })
          .catch(function () { /* keep chatting even if a save fails */ });
      }

      // ---------------------------------------------- Save (pin) button
      function updateSaveBtn() {
        saveBtn.disabled = !currentChatId;
        // Star metaphor: ☆ Save -> ★ Saved. Saved (starred) chats pin to the top.
        saveBtn.textContent = currentPinned ? "★ Saved" : "☆ Save";
        saveBtn.title = currentPinned
          ? "Saved — pinned to the top of your chats"
          : "Save this chat (pins it to the top)";
        saveBtn.classList.toggle("btn--saved", currentPinned);
        saveBtn.classList.toggle("btn--ghost", !currentPinned);
      }
      saveBtn.addEventListener("click", function () {
        if (!currentChatId) return;
        var next = !currentPinned;
        currentPinned = next;
        updateSaveBtn();
        SC.Assistant.pin(currentChatId, next)
          .then(function () { loadChats(); })
          .catch(function () { currentPinned = !next; updateSaveBtn(); });
      });

      // ---------------------------------------------- Lightweight markdown
      // The model returns light markdown (bold, bullets). We render a safe subset
      // by escaping everything first, then re-introducing a few tags.
      function renderMarkdown(text) {
        var safe = SC.escapeHtml(text);
        safe = safe.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        var lines = safe.split("\n");
        var html = "";
        var inList = false;
        lines.forEach(function (line) {
          var m = line.match(/^\s*[-*]\s+(.*)$/);
          if (m) {
            if (!inList) { html += "<ul>"; inList = true; }
            html += "<li>" + m[1] + "</li>";
          } else {
            if (inList) { html += "</ul>"; inList = false; }
            if (line.trim()) html += "<p>" + line + "</p>";
          }
        });
        if (inList) html += "</ul>";
        return html;
      }

      // Build the "Sources: …" footer for a bubble (or null if none).
      function buildSources(sources) {
        if (!sources || !sources.length) return null;
        var src = document.createElement("div");
        src.className = "bubble__sources";
        src.innerHTML = "<span>Sources:</span>";
        sources.forEach(function (s) {
          var item;
          if (s.drive_link) {
            item = document.createElement("a");
            item.href = s.drive_link;
            item.target = "_blank";
            item.rel = "noopener";
          } else {
            item = document.createElement("span");
          }
          item.className = "bubble__source";
          item.textContent = s.title || "Document";
          src.appendChild(item);
        });
        return src;
      }

      function addBubble(role, text, sources) {
        var wrap = document.createElement("div");
        wrap.className = "bubble bubble--" + role;
        var body = document.createElement("div");
        body.className = "bubble__body";
        body.innerHTML = role === "assistant" ? renderMarkdown(text) : "<p>" + SC.escapeHtml(text) + "</p>";
        wrap.appendChild(body);

        var src = buildSources(sources);
        if (src) wrap.appendChild(src);

        log.appendChild(wrap);
        log.scrollTop = log.scrollHeight;
        return body;
      }

      // ---------------------------------------------- Auto-grow the textarea
      input.addEventListener("input", function () {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 160) + "px";
      });
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          composer.requestSubmit();
        }
      });

      // ---------------------------------------------- Send
      composer.addEventListener("submit", function (e) {
        e.preventDefault();
        var text = input.value.trim();
        if (!text) return;

        addBubble("user", text);
        convo.push({ role: "user", content: text });
        input.value = "";
        input.style.height = "auto";
        sendBtn.disabled = true;

        var typing = addBubble("assistant", "…");
        var wrap = typing.parentElement;
        wrap.classList.add("is-typing");
        // Animated three-dot "thinking" indicator until the first token lands.
        typing.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';

        var acc = "";            // accumulated reply text
        var streamSources = null;
        var started = false;     // first token received?
        var errored = false;

        function finalize() {
          sendBtn.disabled = false;
          input.focus();
          // Always save the conversation — independent of whether the AI
          // replied — so the chat is titled, appears in the sidebar, and the
          // Save (star) button works even if the AI service is unavailable.
          persist();
        }

        SC.Assistant.chatStream(text, convo.slice(0, -1), taskToggle.checked, {
          onSources: function (s) { streamSources = s; },
          onDelta: function (t) {
            if (!started) { started = true; wrap.classList.remove("is-typing"); typing.innerHTML = ""; }
            acc += t;
            // Render the light markdown live as tokens arrive so formatting
            // (bold, bullets) appears during generation. Incomplete markers
            // (e.g. an unclosed **) simply show as plain text until their
            // closing marker streams in, then snap into formatting.
            typing.innerHTML = renderMarkdown(acc);
            log.scrollTop = log.scrollHeight;
          },
          onError: function (msg) {
            errored = true;
            wrap.classList.remove("is-typing");
            if (!acc) typing.textContent = msg || "Something went wrong.";
          },
          onDone: function () {
            wrap.classList.remove("is-typing");
            if (acc) {
              typing.innerHTML = renderMarkdown(acc);
              var src = buildSources(streamSources);
              if (src) wrap.appendChild(src);
              convo.push({ role: "assistant", content: acc });
            } else if (!errored) {
              typing.textContent = "(no reply)";
            }
            log.scrollTop = log.scrollHeight;
            finalize();
          },
        }).catch(function (err) {
          // Connection couldn't be established (auth/network/cold-start).
          wrap.classList.remove("is-typing");
          var isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1";
          if (isLocal && !acc) {
            var stub = "(Local test reply — the AI service isn't running, so this is a placeholder so you can test chat history and saving.)";
            typing.textContent = stub;
            convo.push({ role: "assistant", content: stub });
          } else if (!acc) {
            typing.textContent = (err && err.status === 503)
              ? "The assistant is warming up or temporarily unavailable — please try again in a moment."
              : ((err && err.message) || "Something went wrong.");
          }
          finalize();
        });
      });

      // ---------------------------------------------- Init
      addBubble("assistant", GREETING);
      loadChats();
    </script>
  </body>
</html>
