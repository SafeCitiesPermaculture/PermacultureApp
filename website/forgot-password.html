<!DOCTYPE html>
<!--
  Safe Cities Permaculture - Forgot password (request a reset link)
  Wired to: PUT /auth/reset-password { username, email }
  The backend emails a link of the form FRONTEND_URL/reset-password/<token>,
  which lands on reset-password.html. No auth required.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset password · Safe Cities Permaculture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" href="./assets/images/logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body data-page="login">
    <a class="skip-link" href="#main">Skip to main content</a>

    <main id="main" class="auth">
      <div class="auth__card">
        <img class="auth__logo" src="./assets/images/logo.png" alt="Safe Cities Permaculture logo" width="72" height="72" />
        <h1 class="auth__title">Reset your password</h1>
        <p class="auth__sub">Enter your username and email - we'll send you a reset link.</p>

        <form id="resetReqForm" novalidate>
          <div class="field">
            <label for="username">Username</label>
            <input id="username" type="text" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" autocomplete="email" required />
          </div>
          <p class="form-msg" id="formMsg" role="alert" aria-live="assertive"></p>
          <button class="btn btn--leaf auth__submit" type="submit" id="submitBtn">Send reset link</button>
        </form>

        <p class="auth__switch">
          <a class="linkbtn" href="login.html">Back to log in</a>
        </p>
      </div>
    </main>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script>
      var form = document.getElementById("resetReqForm");
      var msg = document.getElementById("formMsg");
      var submitBtn = document.getElementById("submitBtn");

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        msg.textContent = "";
        msg.className = "form-msg";
        var username = document.getElementById("username").value.trim();
        var email = document.getElementById("email").value.trim();
        submitBtn.disabled = true;
        submitBtn.textContent = "Sending…";

        SC.requestPasswordReset(username, email)
          .then(function () {
            msg.textContent = "If those details match an account, a reset link is on its way to your email. The link expires in 15 minutes.";
            msg.className = "form-msg form-msg--ok";
            form.reset();
          })
          .catch(function (err) {
            msg.textContent = err.message || "Could not send a reset link. Please try again.";
            msg.className = "form-msg form-msg--error";
          })
          .then(function () {
            submitBtn.disabled = false;
            submitBtn.textContent = "Send reset link";
          });
      });
    </script>
  </body>
</html>
