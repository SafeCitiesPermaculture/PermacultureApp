<!DOCTYPE html>
<!--
  Safe Cities Permaculture — Documents
  Wired to: GET /files/list?parent=<id> · POST /files/:id (download stream)
  Folders are navigated client-side via a breadcrumb stack. Requires login.
  (Upload / folder-create are admin-only on the backend and can be added later.)
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Documents · Safe Cities Permaculture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" href="./assets/images/logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body data-page="documents" data-requires-auth>
    <a class="skip-link" href="#main">Skip to main content</a>

    <main id="main" class="app-main">
      <div class="container">
        <header class="page-head">
          <div>
            <p class="eyebrow">Shared resources</p>
            <h1 class="page-title">Documents</h1>
          </div>
        </header>

        <!-- Admin-only controls. Hidden for non-admins (the backend also enforces
             the admin role on every write, so this is UX only). -->
        <div class="doc-admin" id="adminBar" hidden>
          <input type="file" id="uploadInput" hidden />
          <button class="btn btn--leaf btn--sm" id="uploadBtn" type="button">Upload file</button>
          <button class="btn btn--ghost btn--sm" id="newFolderBtn" type="button">New folder</button>
          <span class="doc-admin__hint" id="uploadHint" hidden>Open a folder to upload files into it.</span>
        </div>

        <!-- Breadcrumb trail; the first crumb is the root folder. -->
        <nav class="crumbs" id="crumbs" aria-label="Folder path"></nav>

        <section aria-labelledby="filesLabel">
          <h2 class="sr-only" id="filesLabel">Files and folders</h2>
          <ul id="fileList" class="file-list"></ul>
          <p class="state" id="loadingState">Loading…</p>
          <p class="state" id="emptyState" hidden>This folder is empty.</p>
          <p class="state state--error" id="errorState" hidden></p>
        </section>
      </div>
    </main>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script>
      var listEl = document.getElementById("fileList");
      var crumbsEl = document.getElementById("crumbs");
      var loadingEl = document.getElementById("loadingState");
      var emptyEl = document.getElementById("emptyState");
      var errorEl = document.getElementById("errorState");

      // The folder path the user has drilled into. Root is represented by null.
      var stack = [{ id: null, name: "Home" }];

      function current() { return stack[stack.length - 1]; }

      // ---- Admin controls ---------------------------------------------------
      // The backend enforces the admin role on every write; this is UX gating.
      var isAdmin = (SC.getCachedUser() || {}).userRole === "admin";
      var adminBar = document.getElementById("adminBar");
      var uploadBtn = document.getElementById("uploadBtn");
      var uploadInput = document.getElementById("uploadInput");
      var newFolderBtn = document.getElementById("newFolderBtn");
      var uploadHint = document.getElementById("uploadHint");

      function syncAdminBar() {
        adminBar.hidden = !isAdmin;
        if (!isAdmin) return;
        // Uploaded files are owned by the Gmail account, which can only write
        // INTO a folder, not the very top level. At root, steer to a folder.
        var atRoot = current().id == null;
        uploadBtn.disabled = atRoot;
        uploadHint.hidden = !atRoot;
      }

      uploadBtn.addEventListener("click", function () { uploadInput.click(); });
      uploadInput.addEventListener("change", function () {
        var file = uploadInput.files && uploadInput.files[0];
        if (!file) return;
        uploadBtn.disabled = true;
        var label = uploadBtn.textContent;
        uploadBtn.textContent = "Uploading…";
        SC.Files.upload(current().id, file)
          .then(function () { SC.toast("Uploaded “" + file.name + "”", "success"); load(); })
          .catch(function (e) { SC.toast(e.message || "Upload failed", "error"); })
          .then(function () { uploadInput.value = ""; uploadBtn.textContent = label; syncAdminBar(); });
      });

      newFolderBtn.addEventListener("click", function () {
        var name = window.prompt("New folder name:");
        if (!name || !name.trim()) return;
        name = name.trim();
        newFolderBtn.disabled = true;
        SC.Files.createFolder(name, current().id)
          .then(function () { SC.toast("Folder “" + name + "” created", "success"); load(); })
          .catch(function (e) { SC.toast(e.message || "Could not create folder", "error"); })
          .then(function () { newFolderBtn.disabled = false; });
      });

      // The cached user may not carry the role yet; upgrade when the fresh copy
      // arrives (app.js dispatches sc:user) and re-render to show the controls.
      document.addEventListener("sc:user", function (e) {
        if (e.detail && e.detail.userRole === "admin" && !isAdmin) { isAdmin = true; load(); }
      });

      function load() {
        listEl.innerHTML = "";
        loadingEl.hidden = false;
        emptyEl.hidden = true;
        errorEl.hidden = true;
        renderCrumbs();
        syncAdminBar();
        SC.Files.list(current().id)
          .then(function (data) {
            var files = (data && data.files) || [];
            loadingEl.hidden = true;
            // Folders first, then files; alphabetical within each group.
            files.sort(function (a, b) {
              if (!!a.isFolder !== !!b.isFolder) return a.isFolder ? -1 : 1;
              return (a.name || "").localeCompare(b.name || "");
            });
            if (!files.length) { emptyEl.hidden = false; return; }
            files.forEach(function (f) { listEl.appendChild(row(f)); });
          })
          .catch(function (err) {
            loadingEl.hidden = true;
            errorEl.hidden = false;
            errorEl.textContent = err.message || "Could not load files.";
          });
      }

      function renderCrumbs() {
        crumbsEl.innerHTML = "";
        stack.forEach(function (crumb, i) {
          var isLast = i === stack.length - 1;
          if (i > 0) {
            var sep = document.createElement("span");
            sep.className = "crumbs__sep";
            sep.textContent = "/";
            sep.setAttribute("aria-hidden", "true");
            crumbsEl.appendChild(sep);
          }
          if (isLast) {
            var span = document.createElement("span");
            span.className = "crumbs__current";
            span.setAttribute("aria-current", "page");
            span.textContent = crumb.name;
            crumbsEl.appendChild(span);
          } else {
            var btn = document.createElement("button");
            btn.className = "crumbs__link";
            btn.textContent = crumb.name;
            btn.addEventListener("click", function () {
              stack = stack.slice(0, i + 1); // pop back to this crumb
              load();
            });
            crumbsEl.appendChild(btn);
          }
        });
      }

      function row(f) {
        var li = document.createElement("li");
        li.className = "file" + (f.isFolder ? " file--folder" : "");
        // Dim items an admin has hidden from the tab (only admins see these).
        if (isAdmin && f.showInDocs === false) li.className += " is-hidden";

        var icon = document.createElement("span");
        icon.className = "file__icon";
        icon.setAttribute("aria-hidden", "true");
        icon.innerHTML = f.isFolder
          ? '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg>'
          : '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h7l5 5v13H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"/><path d="M14 3v5h5"/></svg>';

        var name = document.createElement("span");
        name.className = "file__name";
        name.textContent = f.name || "(untitled)";

        li.appendChild(icon);
        li.appendChild(name);

        // Right-hand actions: download (files) + admin controls.
        var actions = document.createElement("div");
        actions.className = "file__actions";

        if (!f.isFolder) {
          var dl = document.createElement("button");
          dl.className = "btn btn--ghost btn--sm file__dl";
          dl.textContent = "Download";
          dl.addEventListener("click", function (ev) { ev.stopPropagation(); download(f, dl); });
          actions.appendChild(dl);
        }

        if (isAdmin) {
          actions.appendChild(flagBtn(f, "docs"));
          actions.appendChild(flagBtn(f, "ai"));
          var del = document.createElement("button");
          del.type = "button";
          del.className = "btn btn--ghost btn--sm file__del";
          del.textContent = "Delete";
          del.setAttribute("aria-label", "Delete " + (f.name || ""));
          del.addEventListener("click", function (ev) { ev.stopPropagation(); removeItem(f); });
          actions.appendChild(del);
        }

        li.appendChild(actions);

        if (f.isFolder) {
          // Whole row opens the folder (buttons inside stopPropagation).
          li.tabIndex = 0;
          li.setAttribute("role", "button");
          li.setAttribute("aria-label", "Open folder " + (f.name || ""));
          var open = function () { stack.push({ id: f._id, name: f.name }); load(); };
          li.addEventListener("click", open);
          li.addEventListener("keydown", function (e) {
            if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); }
          });
        }
        return li;
      }

      // A per-file toggle for one visibility flag. kind: "docs" | "ai".
      function flagBtn(f, kind) {
        var isDocs = kind === "docs";
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "doc-flag";
        function on() { return isDocs ? f.showInDocs !== false : f.inCorpus !== false; }
        function apply() {
          btn.textContent = isDocs ? "Docs" : "AI";
          btn.classList.toggle("is-on", on());
          btn.classList.toggle("is-off", !on());
          btn.setAttribute("aria-pressed", on() ? "true" : "false");
          btn.title = isDocs
            ? (on() ? "Shown in the Documents tab — click to hide" : "Hidden from the Documents tab — click to show")
            : (on() ? "Used by the AI assistant — click to exclude" : "Excluded from the AI assistant — click to include");
        }
        apply();
        btn.addEventListener("click", function (ev) {
          ev.stopPropagation();
          var next = !on();
          btn.disabled = true;
          SC.Files.setFlags(f._id, isDocs ? { showInDocs: next } : { inCorpus: next })
            .then(function () {
              if (isDocs) { f.showInDocs = next; } else { f.inCorpus = next; }
              apply();
              if (isDocs) {
                var li = btn.closest(".file");
                if (li) li.classList.toggle("is-hidden", !next);
              }
              SC.toast(isDocs
                ? (next ? "Now shown in Documents" : "Hidden from Documents")
                : (next ? "Included in the AI assistant" : "Excluded from the AI assistant"),
                "success");
            })
            .catch(function (e) { SC.toast(e.message || "Could not update", "error"); })
            .then(function () { btn.disabled = false; });
        });
        return btn;
      }

      function removeItem(f) {
        var what = f.isFolder
          ? "the folder “" + f.name + "” and everything inside it"
          : "“" + f.name + "”";
        if (!window.confirm("Delete " + what + " from Google Drive? This cannot be undone.")) return;
        SC.Files.remove(f._id)
          .then(function () { SC.toast("Deleted", "success"); load(); })
          .catch(function (e) { SC.toast(e.message || "Delete failed", "error"); });
      }

      // The backend streams the file back from Google Drive. We read it as a
      // Blob and trigger a browser download with the original name.
      function download(f, btn) {
        btn.disabled = true;
        var label = btn.textContent;
        btn.textContent = "Downloading…";
        SC.Files.download(f._id)
          .then(function (res) { return res.blob(); })
          .then(function (blob) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement("a");
            a.href = url;
            a.download = f.name || "download";
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
          })
          .catch(function (e) { SC.toast(e.message || "Download failed", "error"); })
          .then(function () { btn.disabled = false; btn.textContent = label; });
      }

      load();
    </script>
  </body>
</html>
