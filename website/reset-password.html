<!DOCTYPE html>
<!--
  Safe Cities Permaculture — Set a new password (from the emailed link)
  Wired to: PUT /auth/reset-password/<token> { newPassword }
  The token arrives either as the last path segment (FRONTEND_URL/reset-password/<token>,
  served by an Express route) or as ?token=<token>. No auth required.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Set a new password · Safe Cities Permaculture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" href="./assets/images/logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body data-page="login">
    <a class="skip-link" href="#main">Skip to main content</a>

    <main id="main" class="auth">
      <div class="auth__card">
        <img class="auth__logo" src="./assets/images/logo.png" alt="Safe Cities Permaculture logo" width="72" height="72" />
        <h1 class="auth__title">Set a new password</h1>
        <p class="auth__sub">Choose a new password for your account.</p>

        <form id="resetForm" novalidate>
          <div class="field">
            <label for="newPassword">New password</label>
            <input id="newPassword" type="password" autocomplete="new-password" required minlength="6" />
          </div>
          <div class="field">
            <label for="confirm">Confirm new password</label>
            <input id="confirm" type="password" autocomplete="new-password" required minlength="6" />
          </div>
          <p class="form-msg" id="formMsg" role="alert" aria-live="assertive"></p>
          <button class="btn btn--leaf auth__submit" type="submit" id="submitBtn">Update password</button>
        </form>

        <p class="auth__switch">
          <a class="linkbtn" href="login.html">Back to log in</a>
        </p>
      </div>
    </main>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script src="password-toggle.js"></script>
    <script>
      var form = document.getElementById("resetForm");
      var msg = document.getElementById("formMsg");
      var submitBtn = document.getElementById("submitBtn");

      // Read the token from ?token= first, else from the last path segment
      // (the emailed link looks like .../reset-password/<token>).
      function readToken() {
        var q = new URLSearchParams(location.search).get("token");
        if (q) return q;
        var parts = location.pathname.split("/").filter(Boolean);
        var last = parts[parts.length - 1] || "";
        // Ignore the page filename itself.
        if (last && last !== "reset-password.html") return decodeURIComponent(last);
        return "";
      }
      var token = readToken();

      if (!token) {
        msg.textContent = "This reset link looks incomplete. Please request a new one.";
        msg.className = "form-msg form-msg--error";
        submitBtn.disabled = true;
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        msg.textContent = "";
        msg.className = "form-msg";
        var pw = document.getElementById("newPassword").value;
        var confirm = document.getElementById("confirm").value;
        if (pw.length < 6) { fail("Password must be at least 6 characters."); return; }
        if (pw !== confirm) { fail("Passwords do not match."); return; }

        submitBtn.disabled = true;
        submitBtn.textContent = "Updating…";
        SC.resetPasswordWithToken(token, pw)
          .then(function () {
            msg.textContent = "Password updated! You can now log in with your new password.";
            msg.className = "form-msg form-msg--ok";
            form.reset();
            setTimeout(function () { location.href = "login.html"; }, 1800);
          })
          .catch(function (err) {
            fail(err.message || "This link is invalid or has expired. Please request a new one.");
            submitBtn.disabled = false;
            submitBtn.textContent = "Update password";
          });
      });

      function fail(text) { msg.textContent = text; msg.className = "form-msg form-msg--error"; }
    </script>
  </body>
</html>
