<!DOCTYPE html>
<!--
  Safe Cities Permaculture — Schedule (Tasks)
  Wired to: GET /tasks/ · GET /tasks/completed · POST /tasks/ ·
            PUT /tasks/complete/:id · PUT /tasks/incomplete/:id · DELETE /tasks/:id
  Requires login (data-requires-auth). Header/footer injected by app.js.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Schedule · Safe Cities Permaculture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" href="./assets/images/logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body data-page="schedule" data-requires-auth>
    <a class="skip-link" href="#main">Skip to main content</a>

    <main id="main" class="app-main">
      <div class="container">
        <!-- Page header: title + a primary action. -->
        <header class="page-head">
          <div>
            <p class="eyebrow">Your tasks</p>
            <h1 class="page-title">Schedule</h1>
          </div>
          <button class="btn btn--marigold" id="addTaskBtn">+ New task</button>
        </header>

        <!-- Tabs to switch between open, completed and overdue tasks (all users
             see their own; admins see everyone's). The user filter to the right
             is admin-only and revealed by JS. -->
        <div class="tabs-row">
          <div class="tabs" role="tablist" aria-label="Task lists">
            <button class="tab is-active" id="tabOpen" role="tab" aria-selected="true">Open</button>
            <button class="tab" id="tabDone" role="tab" aria-selected="false">Completed</button>
            <button class="tab" id="tabAll" role="tab" aria-selected="false">Overdue</button>
          </div>
          <select id="userFilter" class="task-user-filter" aria-label="Filter by user" hidden>
            <option value="">All users</option>
          </select>
        </div>

        <!-- Task list + loading / empty states live here. -->
        <section aria-labelledby="listLabel">
          <h2 class="sr-only" id="listLabel">Task list</h2>
          <div id="taskList" class="task-list"></div>
          <p class="state" id="loadingState">Loading tasks…</p>
          <p class="state" id="emptyState" hidden>Nothing here yet.</p>
          <p class="state state--error" id="errorState" hidden></p>
        </section>
      </div>
    </main>

    <!-- ===================== New-task dialog (native <dialog>) ===================== -->
    <dialog id="taskDialog" class="dialog">
      <form method="dialog" class="dialog__form" id="taskForm">
        <h2 class="dialog__title" id="taskDialogTitle">New task</h2>
        <div class="field" id="nameField">
          <label for="taskName">Task name</label>
          <input id="taskName" name="name" type="text" required />
        </div>
        <div class="field" id="dueField">
          <label for="taskDue">Due date &amp; time</label>
          <input id="taskDue" name="due" type="datetime-local" required />
        </div>
        <!-- Admins only: assign the task to a specific worker. Revealed by JS. -->
        <div class="field" id="assigneeField" hidden>
          <label for="taskAssignee">Assign to</label>
          <select id="taskAssignee"></select>
        </div>
        <div class="field" id="notesField">
          <label for="taskNotes">Notes (optional)</label>
          <textarea id="taskNotes" name="notes" rows="2" placeholder="Context, or a reason a task wasn't done in time…"></textarea>
        </div>
        <p class="form-msg" id="taskFormMsg" role="alert"></p>
        <div class="dialog__actions">
          <button type="button" class="btn btn--ghost" id="taskCancel">Cancel</button>
          <button type="submit" class="btn btn--leaf" id="taskSave">Add task</button>
        </div>
      </form>
    </dialog>

    <!-- ===================== Complete-task dialog ===================== -->
    <dialog id="doneDialog" class="dialog">
      <form method="dialog" class="dialog__form" id="doneForm">
        <h2 class="dialog__title">Mark as complete</h2>
        <div class="field">
          <label for="doneNote">Completion note (optional)</label>
          <textarea id="doneNote" name="completionNote" rows="3"></textarea>
        </div>
        <div class="field">
          <label for="donePhoto">Photo (optional)</label>
          <input id="donePhoto" name="photo" type="file" accept="image/*" />
        </div>
        <p class="form-msg" id="doneFormMsg" role="alert"></p>
        <div class="dialog__actions">
          <button type="button" class="btn btn--ghost" id="doneCancel">Cancel</button>
          <button type="submit" class="btn btn--leaf" id="doneSave">Complete task</button>
        </div>
      </form>
    </dialog>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script>
      // --------------------------------------------------------- Elements
      var listEl = document.getElementById("taskList");
      var loadingEl = document.getElementById("loadingState");
      var emptyEl = document.getElementById("emptyState");
      var errorEl = document.getElementById("errorState");
      var tabOpen = document.getElementById("tabOpen");
      var tabDone = document.getElementById("tabDone");
      var userFilter = document.getElementById("userFilter"); // admin-only
      var view = "open"; // "open" | "done" | "overdue"

      var me = SC.getCachedUser() || {};
      var isAdmin = me.userRole === "admin";

      // The id of a task's creator (handles populated or raw refs), used to
      // decide who may edit it. Falls back to the assignee for legacy tasks.
      function ownerId(t) {
        var c = t.createdBy && t.createdBy._id ? t.createdBy._id : t.createdBy;
        var a = t.assignedTo && t.assignedTo._id ? t.assignedTo._id : t.assignedTo;
        return String(c || a || "");
      }
      // Admins may edit any task; everyone else only tasks they created
      // themselves (not ones an admin assigned to them).
      function canEditTask(t) {
        return isAdmin || ownerId(t) === String(me._id);
      }
      function assigneeIdOf(t) {
        var a = t.assignedTo && t.assignedTo._id ? t.assignedTo._id : t.assignedTo;
        return String(a || "");
      }
      // The assignee can add notes (e.g. a reason it wasn't done) even on a
      // task they can't fully edit.
      function canNoteTask(t) {
        return canEditTask(t) || assigneeIdOf(t) === String(me._id);
      }

      // --------------------------------------------------------- Load + render
      // Idempotent paint from a tasks response (may run twice under swr).
      function renderTasks(data) {
        var tasks = data.tasks || [];
        loadingEl.hidden = true;
        errorEl.hidden = true;
        listEl.innerHTML = "";
        if (view === "overdue") tasks = tasks.filter(isOverdue);
        if (!tasks.length) { emptyEl.hidden = false; return; }
        emptyEl.hidden = true;
        tasks.forEach(function (t) { listEl.appendChild(taskCard(t)); });
      }

      function load() {
        listEl.innerHTML = "";
        loadingEl.hidden = false;
        emptyEl.hidden = true;
        errorEl.hidden = true;

        function fail(err) {
          loadingEl.hidden = true;
          errorEl.hidden = false;
          errorEl.textContent = err.message || "Could not load tasks.";
        }

        if (isAdmin) {
          // Admins see everyone's tasks and can filter by a specific user.
          // Overdue = incomplete tasks; renderTasks trims to the overdue ones.
          var query = { isCompleted: view === "done" };
          if (userFilter.value) query.assignedTo = userFilter.value;
          SC.Admin.tasks(query).then(renderTasks).catch(fail);
        } else {
          // Regular users: only their own tasks. Open + Overdue both come from
          // the open list (renderTasks trims Overdue); Completed from completed.
          var key = view === "done" ? "done" : "open";
          SC.swr(
            "tasks:" + key,
            function () { return key === "done" ? SC.Tasks.completed() : SC.Tasks.open(); },
            renderTasks
          ).catch(fail);
        }
      }

      // A task change can affect either list — drop both cached views.
      function dropTasksCache() {
        SC.swrDrop("tasks:open");
        SC.swrDrop("tasks:done");
      }

      // A task is overdue when it's incomplete and past its due date.
      function isOverdue(t) {
        return !t.isCompleted && new Date(t.dueDateTime) < new Date();
      }

      // Build one task row. Uses DOM APIs (not innerHTML) for user-supplied text
      // to avoid any chance of HTML injection.
      function taskCard(t) {
        var card = document.createElement("article");
        card.className = "task";

        var main = document.createElement("div");
        main.className = "task__main";
        var h = document.createElement("h3");
        h.className = "task__name";
        h.textContent = t.name || "Untitled task";
        var meta = document.createElement("p");
        meta.className = "task__meta";
        // Admins see everyone's tasks, so prefix each with the assignee's name.
        var prefix = "";
        if (isAdmin) {
          var who = t.assignedTo && t.assignedTo.username ? t.assignedTo.username : "Unassigned";
          prefix = who + " · ";
        }
        if (t.isCompleted) {
          meta.textContent = prefix + "Completed " + SC.formatDate(t.completedAt);
          if (t.completionNote) meta.textContent += " · " + t.completionNote;
        } else {
          var due = new Date(t.dueDateTime);
          var overdue = !isNaN(due) && due < new Date();
          meta.textContent = prefix + "Due " + SC.formatDate(t.dueDateTime);
          if (overdue) { meta.classList.add("is-overdue"); meta.textContent += " · Overdue"; }
        }
        main.appendChild(h);
        main.appendChild(meta);
        if (t.notes) {
          var notesEl = document.createElement("p");
          notesEl.className = "task__meta task__notes";
          notesEl.textContent = "📝 " + t.notes;
          main.appendChild(notesEl);
        }

        var actions = document.createElement("div");
        actions.className = "task__actions";
        if (t.isCompleted) {
          actions.appendChild(button("Reopen", "btn--ghost btn--sm", function () { reopen(t); }));
        } else {
          // Admins can reschedule (new date + reassign). Editing core details is
          // for the creator/admin; the assignee can still add a note.
          if (isAdmin) {
            actions.appendChild(button("Reschedule", "btn--ghost btn--sm", function () { openEdit(t, "reschedule"); }));
          }
          if (canEditTask(t)) {
            actions.appendChild(button("Edit", "btn--ghost btn--sm", function () { openEdit(t, "edit"); }));
          } else if (canNoteTask(t)) {
            actions.appendChild(button("Note", "btn--ghost btn--sm", function () { openEdit(t, "note"); }));
          }
          actions.appendChild(button("Complete", "btn--leaf btn--sm", function () { openDone(t); }));
          if (canEditTask(t)) {
            actions.appendChild(button("Delete", "btn--ghost btn--sm", function () { removeTask(t); }));
          }
        }

        card.appendChild(main);
        card.appendChild(actions);
        return card;
      }

      function button(label, cls, onClick) {
        var b = document.createElement("button");
        b.className = "btn " + cls;
        b.textContent = label;
        b.addEventListener("click", onClick);
        return b;
      }

      // --------------------------------------------------------- Actions
      function removeTask(t) {
        if (!confirm('Delete "' + t.name + '"?')) return;
        SC.Tasks.remove(t._id).then(function () {
          SC.toast("Task deleted", "success");
          dropTasksCache();
          load();
        }).catch(function (e) { SC.toast(e.message || "Delete failed", "error"); });
      }

      function reopen(t) {
        SC.Tasks.reopen(t._id).then(function () {
          SC.toast("Task reopened", "success");
          dropTasksCache();
          load();
        }).catch(function (e) { SC.toast(e.message || "Could not reopen", "error"); });
      }

      // --------------------------------------------------------- Tabs
      var tabAll = document.getElementById("tabAll");
      var tabMap = { open: tabOpen, done: tabDone, overdue: tabAll };
      function setView(v) {
        view = v;
        Object.keys(tabMap).forEach(function (key) {
          var on = key === v;
          tabMap[key].classList.toggle("is-active", on);
          tabMap[key].setAttribute("aria-selected", String(on));
        });
        load();
      }
      tabOpen.addEventListener("click", function () { setView("open"); });
      tabDone.addEventListener("click", function () { setView("done"); });
      tabAll.addEventListener("click", function () { setView("overdue"); });

      // Admin user filter: reload the current tab whenever the selection changes.
      userFilter.addEventListener("change", function () { load(); });

      // Admins only: populate the "Assign to" picker (new-task dialog) and the
      // "Filter by user" dropdown with every verified user, so an admin can
      // assign to / filter by anyone. Fetched live, so users added later appear.
      var assigneeField = document.getElementById("assigneeField");
      var assigneeSelect = document.getElementById("taskAssignee");
      var workersLoaded = false;
      function loadWorkers() {
        if (!isAdmin || workersLoaded) return;
        workersLoaded = true;
        SC.Admin.verified().then(function (data) {
          var users = data || []; // /admin/verified returns the array directly
          assigneeSelect.innerHTML = "";
          var selfOpt = document.createElement("option");
          selfOpt.value = me._id;
          selfOpt.textContent = "Myself";
          assigneeSelect.appendChild(selfOpt);
          // Keep any current filter selection while rebuilding its options.
          var currentFilter = userFilter.value;
          userFilter.innerHTML = '<option value="">All users</option>';
          users
            .slice()
            .sort(function (a, b) { return (a.username || "").localeCompare(b.username || ""); })
            .forEach(function (u) {
              // Assignee picker: everyone except me (I'm already "Myself").
              if (String(u._id) !== String(me._id)) {
                var aOpt = document.createElement("option");
                aOpt.value = u._id;
                aOpt.textContent = u.username;
                assigneeSelect.appendChild(aOpt);
              }
              // User filter: every user (including me).
              var fOpt = document.createElement("option");
              fOpt.value = u._id;
              fOpt.textContent = u.username;
              userFilter.appendChild(fOpt);
            });
          userFilter.value = currentFilter; // restore selection if still present
        }).catch(function () { /* leave the pickers with defaults on error */ });
      }

      // Reveal the admin-only "Filter by user" dropdown + worker picker for
      // admins (cached role first, then refreshed once /auth/userdata returns).
      // The Open/Completed/Overdue tabs themselves are visible to everyone.
      function applyRole(u) {
        if (u && u.userRole === "admin") {
          if (!isAdmin) { isAdmin = true; me = u; load(); } // re-render as admin
          userFilter.hidden = false;
          loadWorkers();
        }
      }
      applyRole(SC.getCachedUser());
      document.addEventListener("sc:user", function (e) { applyRole(e.detail); });

      // --------------------------------------------------------- New task dialog
      var taskDialog = document.getElementById("taskDialog");
      var taskForm = document.getElementById("taskForm");
      var taskMsg = document.getElementById("taskFormMsg");
      var taskDialogTitle = document.getElementById("taskDialogTitle");
      var taskSaveBtn = document.getElementById("taskSave");
      var nameField = document.getElementById("nameField");
      var dueField = document.getElementById("dueField");
      var notesField = document.getElementById("notesField");
      var taskNameInput = document.getElementById("taskName");
      var taskDueInput = document.getElementById("taskDue");
      var taskNotes = document.getElementById("taskNotes");
      var editingTask = null; // null = creating a new task
      var editMode = "create"; // create | edit | reschedule | note

      // The value a <input type="datetime-local"> expects: YYYY-MM-DDTHH:mm
      // in local time.
      function toLocalInputValue(value) {
        var d = new Date(value);
        if (isNaN(d)) return "";
        var pad = function (n) { return String(n).padStart(2, "0"); };
        return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()) +
          "T" + pad(d.getHours()) + ":" + pad(d.getMinutes());
      }

      // Show/hide dialog fields and set the title/button for a given mode.
      function configureDialog(mode) {
        editMode = mode;
        var showName = mode === "create" || mode === "edit";
        var showDue = mode !== "note";
        var showAssignee = isAdmin && mode !== "note";
        nameField.hidden = !showName;
        taskNameInput.required = showName;
        dueField.hidden = !showDue;
        taskDueInput.required = showDue;
        assigneeField.hidden = !showAssignee;
        var titles = { create: "New task", edit: "Edit task", reschedule: "Reschedule task", note: "Add a note" };
        var btns = { create: "Add task", edit: "Save changes", reschedule: "Reschedule", note: "Save note" };
        taskDialogTitle.textContent = titles[mode];
        taskSaveBtn.textContent = btns[mode];
      }

      document.getElementById("addTaskBtn").addEventListener("click", function () {
        editingTask = null;
        taskMsg.textContent = "";
        taskForm.reset();
        if (isAdmin) assigneeSelect.value = me._id; // default: assign to myself
        configureDialog("create");
        taskDialog.showModal();
      });

      // Open the dialog pre-filled, in "edit", "reschedule" or "note" mode.
      function openEdit(t, mode) {
        editingTask = t;
        taskMsg.textContent = "";
        taskNameInput.value = t.name || "";
        taskDueInput.value = toLocalInputValue(t.dueDateTime);
        taskNotes.value = t.notes || "";
        if (isAdmin) {
          var aid = t.assignedTo && t.assignedTo._id ? t.assignedTo._id : t.assignedTo;
          assigneeSelect.value = String(aid || me._id);
        }
        configureDialog(mode || "edit");
        taskDialog.showModal();
      }

      document.getElementById("taskCancel").addEventListener("click", function () { taskDialog.close(); });
      taskForm.addEventListener("submit", function (e) {
        e.preventDefault();
        var name = taskNameInput.value.trim();
        var due = taskDueInput.value;
        var notes = taskNotes.value.trim();
        if ((editMode === "create" || editMode === "edit") && (!name || !due)) {
          taskMsg.textContent = "Please fill in the task name and due date."; return;
        }
        if (editMode === "reschedule" && !due) {
          taskMsg.textContent = "Please pick a new due date."; return;
        }
        taskSaveBtn.disabled = true;

        // Build the request body from the fields relevant to this mode.
        var body = {};
        if (editMode !== "note") {
          body.dueDateTime = new Date(due).toISOString();
          body.notes = notes;
          if (editMode === "create" || editMode === "edit") body.name = name;
          // Admins choose the assignee; non-admins always get their own task.
          if (isAdmin && assigneeSelect.value) body.assignedTo = assigneeSelect.value;
        } else {
          body.notes = notes;
        }

        var wasEditing = !!editingTask;
        var done = wasEditing
          ? SC.Tasks.update(editingTask._id, body)
          : SC.Tasks.create(body);
        done
          .then(function () {
            taskDialog.close();
            SC.toast(wasEditing ? "Task updated" : "Task added", "success");
            dropTasksCache();
            if (!wasEditing && view !== "open") setView("open"); else load();
          })
          .catch(function (err) { taskMsg.textContent = err.message || "Could not save task."; })
          .then(function () { taskSaveBtn.disabled = false; });
      });

      // --------------------------------------------------------- Complete dialog
      var doneDialog = document.getElementById("doneDialog");
      var doneForm = document.getElementById("doneForm");
      var doneMsg = document.getElementById("doneFormMsg");
      var doneTarget = null;
      function openDone(t) {
        doneTarget = t;
        doneForm.reset();
        doneMsg.textContent = "";
        doneDialog.showModal();
      }
      document.getElementById("doneCancel").addEventListener("click", function () { doneDialog.close(); });
      doneForm.addEventListener("submit", function (e) {
        e.preventDefault();
        if (!doneTarget) return;
        var saveBtn = document.getElementById("doneSave");
        saveBtn.disabled = true;
        // Build multipart so the optional photo can ride along.
        var fd = new FormData();
        var note = document.getElementById("doneNote").value.trim();
        var photo = document.getElementById("donePhoto").files[0];
        if (note) fd.append("completionNote", note);
        if (photo) fd.append("photo", photo);
        SC.Tasks.complete(doneTarget._id, fd)
          .then(function () {
            doneDialog.close();
            SC.toast("Task completed 🎉", "success");
            dropTasksCache();
            load();
          })
          .catch(function (err) { doneMsg.textContent = err.message || "Could not complete task."; })
          .then(function () { saveBtn.disabled = false; });
      });

      // --------------------------------------------------------- Go
      load();
    </script>
  </body>
</html>
